services:
  neo4j:
    image: neo4j:5
    container_name: musicgraph-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data

  backend:
    build: ./backend
    container_name: musicgraph-backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MUSICBRAINZ_BASE_URL: ${MUSICBRAINZ_BASE_URL}
      MUSICBRAINZ_USER_AGENT: ${MUSICBRAINZ_USER_AGENT}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - neo4j

  frontend:
    build: ./frontend
    container_name: musicgraph-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  neo4j_data:
